spring.application.name=repodoctor

# Database Configuration (Defaults to H2 for local dev, override with env vars for PostgreSQL/Supabase)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/repodoctor}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hikari Connection Pool Settings (Tuned for Supabase free-tier limits)
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# JPA / Hibernate
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# GitHub API
github.token=${GITHUB_TOKEN:}

# Request Timeout
spring.mvc.async.request-timeout=120000